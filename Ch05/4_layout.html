<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4_layout</title>
    <style>
        /* 초기화 */
        * {
            margin : 0;
            padding: 0;
            font: normal 12px '돋움';
        }

        ul, ol { list-style: none; } /* 리스트 앞에 기호 제거 */
        a { text-decoration: none; color: #111;} /* 하이퍼링크 밑줄 제거 */
        input, textarea { outline: none; }  /* 인풋박스 focus 테두리 제거 */

        #container {
            width: 800px;
            height: auto;
            padding: 10px;
            border: 1px solid black;
            box-sizing: border-box;
            margin: 0 auto;
        }

        /* 헤더 */
        header {
            height: 120px;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        /* 메인 */
        main {
            width: 100%;
            min-height: 400px;
            padding: 10px;
            margin: 10px 0;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
            overflow: hidden;
        }

        main > aside {
            width: 216px;
            height: 400px;
            background: #ccc;
            border: 1px dashed black;
            box-sizing: border-box;
            float: left;
        }

        main > section {
            width: 530px;
            height: 400px;
            margin-left: 10px;
            background: #ccc;
            border: 1px dashed black;
            box-sizing: border-box;
            float: left;
        }

        /* 푸터 */
        footer {
            width: 100%;
            height: 100px;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="container">
        <header>header</header>
        <main>
            <p>main</p>
            <aside>aside</aside>
            <section>section</section>
        </main>
        <footer>footer</footer>
    </div>
</body>
</html>
